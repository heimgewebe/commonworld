name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install public runtime dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install bounded browser runtime
        run: npx playwright install --with-deps chromium
      - name: Rebuild committed public runtime
        run: |
          npm run build
          git diff --exit-code
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate canonical globe core
        run: make validate
      - name: Run failure-safe browser smoke
        run: npm run smoke:browser
