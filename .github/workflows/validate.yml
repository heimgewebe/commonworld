name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate contracts and examples
        run: make validate
      - name: Run map browser interaction smoke
        run: make smoke-map-browser
